<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唯美風景照</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Serif TC",serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    color:#f4ead7;

    background:
    repeating-linear-gradient(
        90deg,
        rgba(20,20,20,.95) 0px,
        rgba(20,20,20,.95) 22px,
        rgba(60,60,60,.8) 22px,
        rgba(60,60,60,.8) 26px
    ),
    linear-gradient(
        135deg,
        #251c15,
        #3b2c22,
        #4f3a2b,
        #241912
    );

    background-size:120px 120px,cover;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center,
    rgba(255,215,170,.15),
    transparent 60%);
    pointer-events:none;
}

/* 首頁 */
#welcome{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:30px;
}

#welcome h1{
    font-size:3rem;
    letter-spacing:4px;
    text-shadow:0 0 20px rgba(255,220,180,.4);
}

.beige-btn{
    background:#c8ab7a;
    color:#1f1f1f;
    border:none;
    padding:15px 40px;
    border-radius:10px;
    font-size:1.1rem;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.beige-btn:hover{
    transform:translateY(-3px);
    background:#ddc59b;
}

/* 探索頁 */
#explorePage{
    display:none;
    padding:40px;
}

.content{
    display:flex;
    gap:50px;
    align-items:flex-start;
}

/* 電影膠卷框 */
.film-frame{
    width:566px;
    height:378px;
    background:black;
    border:18px solid black;
    position:relative;
    box-shadow:
    0 0 40px rgba(0,0,0,.7),
    0 0 60px rgba(255,210,150,.15);
}

.film-frame::before,
.film-frame::after{
    content:"";
    position:absolute;
    left:-18px;
    width:100%;
    height:20px;
    background:
    repeating-linear-gradient(
        90deg,
        white 0px,
        white 12px,
        black 12px,
        black 30px
    );
}

.film-frame::before{
    top:-18px;
}

.film-frame::after{
    bottom:-18px;
}

.film-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 介紹區 */
.info{
    max-width:450px;
    padding-top:30px;
}

.location-title{
    display:inline-block;
    border:2px solid #d8be92;
    padding:10px 25px;
    margin-bottom:25px;
    font-size:1.5rem;
    color:#f4e5c8;
    background:rgba(0,0,0,.25);
}

#description{
    line-height:2;
    color:#eadfcf;
    font-size:1.05rem;
}

/* 按鈕區 */
.nav{
    margin-top:25px;
    margin-left:10px;
}

.nav button{
    margin-right:15px;
}

/* 結束頁 */
#endPage{
    display:none;
    position:absolute;
    inset:0;
    justify-content:center;
    align-items:center;
    font-size:4rem;
    letter-spacing:10px;
    text-shadow:0 0 30px rgba(255,220,180,.5);
}
</style>
</head>
<body>

<!-- 首頁 -->
<div id="welcome">
    <h1>準備好探索世界了嗎</h1>
    <button class="beige-btn" onclick="startJourney()">
        開始探索
    </button>
</div>

<!-- 探索頁 -->
<div id="explorePage">

    <div class="content">

        <div>
            <div class="film-frame">
                <img id="photo">
            </div>

            <div class="nav">
                <button class="beige-btn" onclick="previousPhoto()">
                    回到上一張
                </button>

                <button class="beige-btn" onclick="nextPhoto()">
                    繼續探索
                </button>
            </div>
        </div>

        <div class="info">
            <div class="location-title" id="title"></div>
            <p id="description"></p>
        </div>

    </div>

</div>

<!-- 結束頁 -->
<div id="endPage">
    旅程結束
</div>

<script>

const places = [

{
title:"中國烏鎮",
image:"wuzhen.jpg",
description:"烏鎮擁有千年水鄉文化，古老木造建築沿河而立，小船穿梭於靜謐水道之間。夜晚燈火映照河面，展現江南獨有的詩意與人文風情，是中國最具代表性的古鎮之一。"
},

{
title:"台灣日月潭",
image:"sunmoonlake.jpg",
description:"日月潭坐落群山環抱之中，湖面如鏡倒映天光雲影。清晨薄霧瀰漫湖畔，傍晚夕陽染紅天際，展現自然與寧靜交融的絕美景色，被譽為台灣最具代表性的湖泊。"
},

{
title:"北極冰川",
image:"arctic.jpg",
description:"廣闊冰川與漂浮冰山構成純淨而壯麗的極地景觀。湛藍海面映照雪白山峰，在極寒環境中展現大自然鬼斧神工的力量，是探索地球原始風貌的重要地區。"
}

];

let remaining = [];
let visited = [];
let currentIndex = -1;

function startJourney(){

document.getElementById("welcome").style.display="none";
document.getElementById("explorePage").style.display="block";

remaining=[...places];

showRandomPhoto();
}

function showRandomPhoto(){

if(remaining.length===0){

document.getElementById("explorePage").style.display="none";

document.getElementById("endPage").style.display="flex";

return;
}

let randomIndex=Math.floor(
Math.random()*remaining.length
);

let chosen=remaining[randomIndex];

visited.push(chosen);

remaining.splice(randomIndex,1);

currentIndex=visited.length-1;

render(chosen);
}

function render(place){

document.getElementById("photo").src=place.image;

document.getElementById("title").innerText=
place.title;

document.getElementById("description").innerText=
place.description;
}

function previousPhoto(){

if(currentIndex>0){

currentIndex--;

render(
visited[currentIndex]
);

}
}

function nextPhoto(){

if(currentIndex < visited.length-1){

currentIndex++;

render(
visited[currentIndex]
);

return;
}

showRandomPhoto();
}

</script>

</body>
</html>
