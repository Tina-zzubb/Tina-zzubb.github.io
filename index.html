<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唯美風景照</title>

<style>
pyramid.jpg      (埃及金字塔)
fuji.jpg         (富士山)
wuzhen.jpg       (烏鎮)
sunmoonlake.jpg  (日月潭)
arctic.jpg       (北極冰川)
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei";
}

body{
overflow:hidden;
height:100vh;

/* 膠卷底片背景 */
background:
repeating-linear-gradient(
90deg,
#2a2118 0px,
#2a2118 140px,
#000 140px,
#000 155px,
#2a2118 155px,
#2a2118 300px
);

position:relative;
}

/* 膠卷孔洞 */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:
radial-gradient(circle,#c6ab7b 12px,transparent 13px);
background-size:70px 70px;
opacity:.12;
pointer-events:none;
}

/* ==================== */
/* 首頁 */
/* ==================== */

#welcome{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
backdrop-filter:blur(3px);
}

#welcome h1{
font-size:60px;
color:#f3e2c3;
letter-spacing:4px;
text-shadow:
0 0 15px rgba(255,220,170,.4),
0 0 40px rgba(255,220,170,.2);
margin-bottom:40px;
}

.startBtn{
padding:18px 45px;
border:none;
cursor:pointer;
font-size:20px;
border-radius:12px;
background:#c9b28a;
color:#2a2118;
font-weight:bold;
transition:.4s;
}

.startBtn:hover{
transform:translateY(-3px);
background:#dcc4a0;
}

/* ==================== */
/* 主頁 */
/* ==================== */

#mainPage{
display:none;
padding:40px;
height:100%;
}

.siteTitle{
position:absolute;
top:20px;
right:40px;
font-size:36px;
color:#e8d2ab;
font-weight:bold;
letter-spacing:5px;
}

/* 電影膠卷框 */

.content{
margin-top:60px;
display:flex;
align-items:flex-start;
gap:40px;
}

.filmFrame{
width:600px;
height:400px;
background:#000;
padding:20px;
position:relative;
border-radius:8px;
box-shadow:
0 0 40px rgba(0,0,0,.5);
}

.filmFrame::before,
.filmFrame::after{
content:"";
position:absolute;
left:0;
width:100%;
height:16px;

background:
repeating-linear-gradient(
90deg,
#fff 0px,
#fff 12px,
transparent 12px,
transparent 30px
);
}

.filmFrame::before{
top:5px;
}

.filmFrame::after{
bottom:5px;
}

.filmFrame img{
width:100%;
height:100%;
object-fit:cover;
border-radius:3px;
}

/* 介紹區 */

.info{
width:500px;
padding-top:20px;
}

.placeTitle{
display:inline-block;
padding:10px 20px;
border:2px solid #c8b087;
color:#f4dfbc;
font-size:30px;
margin-bottom:25px;
}

.description{
font-size:21px;
line-height:2;
color:#ead8bb;
text-shadow:0 0 8px rgba(255,255,255,.1);
}

/* 按鈕 */

.buttons{
margin-top:25px;
width:600px;
display:flex;
justify-content:space-between;
}

.navBtn{
padding:15px 35px;
border:none;
cursor:pointer;
font-size:18px;
font-weight:bold;
background:#c9b28a;
color:#2a2118;
border-radius:10px;
transition:.3s;
}

.navBtn:hover{
transform:translateY(-3px);
}

/* 結束畫面 */

#endPage{
display:none;
position:absolute;
width:100%;
height:100%;
justify-content:center;
align-items:center;
}

#endPage h1{
font-size:80px;
color:#f4dfbc;
letter-spacing:8px;
text-shadow:
0 0 20px rgba(255,220,170,.5);
}

</style>
</head>
<body>

<div id="welcome">

<h1>準備好探索世界了嗎</h1>

<button class="startBtn"
onclick="startJourney()">
開始探索
</button>

</div>

<div id="mainPage">

<div class="siteTitle">唯美風景照</div>

<div class="content">

<div>

<div class="filmFrame">
<img id="photo">
</div>

<div class="buttons">
<button class="navBtn" onclick="previousPhoto()">
回到上一張
</button>

<button class="navBtn" onclick="nextPhoto()">
繼續探索
</button>
</div>

</div>

<div class="info">

<div class="placeTitle" id="title"></div>

<div class="description" id="desc"></div>

</div>

</div>

</div>

<div id="endPage">
<h1>旅程結束</h1>
</div>

<script>

const places=[

{
title:"【埃及金字塔】",
image:"pyramid.jpg",
desc:"位於埃及吉薩高原，是古代文明最具代表性的建築之一。歷經數千年風沙仍屹立不搖，展現古埃及人卓越的建築智慧與神秘文化魅力。"
},

{
title:"【日本富士山】",
image:"fuji.jpg",
desc:"富士山是日本最高峰，也是日本精神象徵。四季景色變化萬千，山形優美壯麗，吸引無數旅人前往欣賞與朝聖。"
},

{
title:"【中國烏鎮】",
image:"wuzhen.jpg",
desc:"烏鎮擁有典雅水鄉風貌與悠久歷史文化，小橋流水與古老建築交織出詩意景緻，是江南最具代表性的古鎮之一。"
},

{
title:"【台灣日月潭】",
image:"sunmoonlake.jpg",
desc:"日月潭是台灣最著名湖泊之一，湖光山色相互映襯。晨曦與夕陽映照湖面時，呈現寧靜而夢幻的自然景觀。"
},

{
title:"【北極冰川】",
image:"arctic.jpg",
desc:"廣闊冰原與純淨海域構成壯觀景色，漂浮冰山映照天空色彩。這片極地世界展現地球最純粹且震撼的自然力量。"
}

];

let randomOrder=[];
let currentIndex=0;

function shuffle(){

randomOrder=[...places];

for(let i=randomOrder.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[randomOrder[i],randomOrder[j]]=
[randomOrder[j],randomOrder[i]];

}
}

function showPhoto(){

const place=randomOrder[currentIndex];

document.getElementById("photo").src=
place.image;

document.getElementById("title").innerText=
place.title;

document.getElementById("desc").innerText=
place.desc;
}

function startJourney(){

document.getElementById("welcome").style.display=
"none";

document.getElementById("mainPage").style.display=
"block";

shuffle();

showPhoto();
}

function nextPhoto(){

if(currentIndex < randomOrder.length-1){

currentIndex++;

showPhoto();

}else{

document.getElementById("mainPage").style.display=
"none";

document.getElementById("endPage").style.display=
"flex";
}
}

function previousPhoto(){

if(currentIndex>0){

currentIndex--;

showPhoto();
}
}

</script>

</body>
</html>
