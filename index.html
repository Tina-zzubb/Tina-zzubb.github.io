<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>唯美風景照</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Serif TC',serif;
}

body{
overflow:hidden;
height:100vh;

background:
radial-gradient(circle at center,
rgba(201,172,122,0.15),
rgba(40,28,18,0.85)),
repeating-linear-gradient(
90deg,
rgba(0,0,0,0.12) 0px,
rgba(0,0,0,0.12) 8px,
transparent 8px,
transparent 200px
),
linear-gradient(
135deg,
#2c2218,
#4d3928,
#7c6343,
#3a2b1f
);

background-size:cover;

color:#f5ead8;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;

background:
radial-gradient(circle at 30% 30%, rgba(255,255,255,.05), transparent 30%),
radial-gradient(circle at 70% 70%, rgba(255,255,255,.03), transparent 30%);

pointer-events:none;
}

.screen{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:absolute;
top:0;
left:0;
}

.hidden{
display:none;
}

h1{
font-size:4rem;
font-weight:700;
letter-spacing:4px;
text-shadow:0 0 30px rgba(255,220,170,.4);
margin-bottom:40px;
}

.btn{
padding:16px 40px;
background:#d2b48c;
border:none;
border-radius:10px;
cursor:pointer;
font-size:1rem;
font-weight:600;
transition:.3s;
color:#2c2218;
box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.btn:hover{
transform:translateY(-3px);
background:#e2c59e;
}

.gallery-page{
padding:40px;
display:flex;
flex-direction:column;
align-items:flex-start;
justify-content:flex-start;
}

.content{
display:flex;
align-items:flex-start;
gap:40px;
margin-top:30px;
}

.film-frame{
width:600px;
height:400px;
background:black;
padding:18px;
position:relative;
box-shadow:
0 0 40px rgba(0,0,0,.6),
0 0 60px rgba(255,220,170,.1);
}

.film-frame::before,
.film-frame::after{
content:"";
position:absolute;
top:0;
width:22px;
height:100%;
background:
repeating-linear-gradient(
to bottom,
transparent 0,
transparent 16px,
white 16px,
white 32px
);
}

.film-frame::before{
left:-22px;
}

.film-frame::after{
right:-22px;
}

.film-frame img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
max-width:500px;
padding-top:20px;
}

.location-title{
display:inline-block;
border:2px solid #d2b48c;
padding:8px 18px;
font-size:1.6rem;
margin-bottom:20px;
font-weight:700;
}

.description{
font-size:1.15rem;
line-height:2;
color:#f1e6d3;
}

.controls{
margin-top:25px;
display:flex;
gap:15px;
}

.end-title{
font-size:4rem;
margin-bottom:40px;
}

.end-buttons{
display:flex;
gap:20px;
}

@media(max-width:1200px){

.content{
flex-direction:column;
align-items:center;
}

.gallery-page{
align-items:center;
}

.info{
max-width:90%;
text-align:center;
}

}

</style>
</head>
<body>

<!-- 首頁 -->
<div id="home" class="screen">

<h1>準備好探索世界了嗎</h1>

<button class="btn" onclick="startJourney()">
開始探索
</button>

</div>

<!-- 景點頁 -->
<div id="gallery" class="screen gallery-page hidden">

<div class="content">

<div class="film-frame">
<img id="photo">
</div>

<div class="info">
<div class="location-title" id="title"></div>
<div class="description" id="description"></div>
</div>

</div>

<div class="controls">
<button class="btn" onclick="previousPhoto()">
回到上一張
</button>

<button class="btn" onclick="nextPhoto()">
繼續探索
</button>
</div>

</div>

<!-- 結束頁 -->
<div id="ending" class="screen hidden">

<div class="end-title">
旅程結束
</div>

<div class="end-buttons">

<button class="btn" onclick="restartJourney()">
再來一次
</button>

<button class="btn" onclick="backHome()">
結束探索
</button>

</div>

</div>

<script>

const locations = [

{
title:"埃及金字塔",
image:"pyramid.jpg",
description:"矗立於浩瀚沙漠中的古老奇蹟，歷經數千年風沙依然屹立不搖。它不僅象徵古埃及文明的巔峰智慧，也承載著人類對永恆與未知世界的想像。"
},

{
title:"日本富士山",
image:"fuji.jpg",
description:"優雅而對稱的山體被譽為日本精神象徵。四季景色各異，春櫻、夏綠、秋楓與冬雪交織出如畫風景，吸引無數旅人前來朝聖。"
},

{
title:"中國烏鎮",
image:"wuzhen.webp",
description:"古色古香的水鄉小鎮，以蜿蜒河道與木造建築聞名。小船緩緩穿梭其間，映照出江南千年的文化底蘊與悠閒生活氣息。"
},

{
title:"台灣日月潭",
image:"sunmoonlake.jpg",
description:"湖光山色交融的自然秘境，清晨雲霧繚繞，黃昏霞光倒映湖面。這裡融合自然景觀與原住民族文化，是台灣最具代表性的湖泊。"
},

{
title:"北極冰川",
image:"arctic.jpg",
description:"純白冰雪覆蓋天地，巨大的冰山漂浮於寧靜海面。這片極地世界展現地球最原始的壯麗景觀，也提醒人們珍惜脆弱的自然環境。"
}

];

let randomOrder=[];
let currentIndex=0;

function shuffleArray(arr){

let copy=[...arr];

for(let i=copy.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[copy[i],copy[j]]=[copy[j],copy[i]];
}

return copy;
}

function startJourney(){

randomOrder=shuffleArray(locations);

currentIndex=0;

document.getElementById("home").classList.add("hidden");
document.getElementById("gallery").classList.remove("hidden");

showPhoto();
}

function showPhoto(){

let item=randomOrder[currentIndex];

document.getElementById("photo").src=item.image;
document.getElementById("title").textContent=item.title;
document.getElementById("description").textContent=item.description;
}

function nextPhoto(){

if(currentIndex<randomOrder.length-1){

currentIndex++;
showPhoto();

}else{

document.getElementById("gallery").classList.add("hidden");
document.getElementById("ending").classList.remove("hidden");

}

}

function previousPhoto(){

if(currentIndex>0){

currentIndex--;
showPhoto();

}

}

function restartJourney(){

randomOrder=shuffleArray(locations);

currentIndex=0;

document.getElementById("ending").classList.add("hidden");
document.getElementById("gallery").classList.remove("hidden");

showPhoto();
}

function backHome(){

document.getElementById("ending").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");

}

</script>

</body>
</html>
